[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cents"
version = "0.1.0"
description = "Agentic investing guidance with thesis-driven research"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]
broker = [
    "alpaca-py>=0.21.0",
]

[project.scripts]
cents = "cents.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/cents"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
