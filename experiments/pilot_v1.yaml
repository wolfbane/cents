# Pilot experiment — 30-day operational shakedown before committing to the
# full hit_rate_delta_v1 run. The pilot's job is to surface engine bugs,
# confirm cost-per-day estimates against reality, and give a directional
# read on hit-rate before committing 3 months of LLM spend.
#
# Stopping rule notes: this is an OPERATIONAL pilot, not a falsification
# attempt. N=200 powers only ~14pp detection — too coarse to call a
# verdict, sufficient to call abort/proceed on the full experiment.
#
# Amendment 2026-05-20: universe scoped to S&P 100 (102 symbols, the
# hand-curated sp100_static_v1 list) instead of S&P 500. The FMP plan
# blocks the sp500 endpoint (see bead cents-u8l). Cadence math still
# holds: max_new_per_run = 5 is the rate-limiter, not universe size, so
# N=200/arm still lands in ~50-60 days against the 30-day calendar
# floor. The full hit_rate_delta_v1 run will need to clear the S&P 500
# universe blocker OR be amended to S&P 100 as well — decide at pilot
# finalize, not here.
#
# Pre-flight checklist before `cents experiment register`:
#   1. ~/.cents/factory.toml exists (run `cents factory init` if not)
#   2. BOTH cost caps configured (daily floor + per-run insurance):
#         a. ~/.cents/config.toml (NOT factory.toml — easy mistake):
#              max_llm_spend_usd_per_day = 5.0
#            OR export CENTS_MAX_LLM_SPEND_USD_PER_DAY=5.0 in the cron env.
#         b. Pair every `cents factory run` with --max-cost-usd 5.0 in the
#            cron command itself. The two caps are independent layers.
#   3. cohort_mode = "paired" (in factory.toml)
#   4. sizing_mode = "equal_dollar" (in factory.toml)
#   5. beta_match_hedge = false (in factory.toml)
#   6. universe set-default points at an S&P 100 universe
#      (sp100_static_v1 — hand-curated 102-symbol list; see amendment
#      note in header for why S&P 500 was deferred)
#   7. `cents universe ingest-delistings` has been run within the last 24h
#   8. `cents usage headroom` returns status=ok with the cap configured
#   9. `cents eval run --gate --baseline-f1 N --baseline-brier N --tolerance-pp 3`
#      passes without regression today. A model drift today means the pilot
#      starts on a degraded model and N=200 won't tell you whether the gap
#      is real or measurement noise. See cents-7abg if Anthropic ships a
#      new Haiku mid-pilot.
#  10. `cents factory status` reports 0 open factory-tag theses. Carryover
#      from prior experiments contaminates cohort labeling — closed-thesis
#      analytics group by experiment_id, but OPEN theses without an
#      experiment_id are ambiguous. Close or migrate them first.
#  11. The cron script hard-codes `--orchestrator-seed $(date +%s)` (or a
#      fixed seed). NOT a random number — reproducibility of the random arm
#      is the whole point.
#  12. Read the decision tree at end of this spec BEFORE seeing data —
#      decide ahead of time what counts as "win", "extend", and "abort".
#      Pre-commit prevents you from talking yourself into a marginal win.

name: pilot_v1
hypothesis: >
  Pilot — confirm operational viability of the two-arm forward test on
  S&P 100 paired-neutral theses (sp100_static_v1, 102 symbols; amended
  from S&P 500 pending FMP plan upgrade — see cents-u8l). Primary go/no-go
  signal is whether the LLM arm's hit-rate is directionally ahead of the
  random arm at N=200 per arm; a hit-rate gap of zero or negative
  triggers abort before committing to the full experiment.

primary_metric: hit_rate_delta_vs_random

# N=200 per arm powers detection of ~14pp gap at 80% power, alpha=0.05.
# Coarse on purpose — pilots learn about cadence and cost, not signal.
minimum_n_per_arm: 200

# 30-day calendar floor on verdict_ready. With ~5 opens/day/arm and
# ~80% close rate, N=200 should land in 50-60 days at minimum; the
# 30-day floor here protects against pathological early-close runs
# (e.g. wide regime swing puts everything on stops in week 1).
minimum_calendar_days: 30

stopping_rule: "later of 30 days AND N=200 per arm"

# Operational notes (not engine-enforced):
#   - cost cap: $5/day (set in ~/.cents/config.toml, NOT this file)
#   - secondary metrics reported: calibration_brier_score, mean_pnl_per_thesis
#   - abort criteria: hit-rate gap < 0 at N=200, OR cost overrun >2x estimate

# Decision tree (pre-commit BEFORE seeing data — pre-registration discipline).
# Evaluate at each stopping-rule checkpoint (N >= 200 AND calendar >= 30 days):
#
#   hit_rate_delta_pp     verdict     next action
#   -----------------     -------     -----------------------------------------
#   < 0                   ABORT       do not run hit_rate_delta_v1; publish
#                                     negative result; propose next experiment
#                                     (different agents / universes / horizons)
#   0  to < 5             EXTEND      run pilot to N=300 for finer signal
#                                     (~14 calendar days more); re-evaluate
#   5  to < 10            PROCEED     register hit_rate_delta_v1 with Set A
#                                     (tight conviction filter — see CLAUDE.md
#                                     "Two alternates" discussion)
#   >= 10                 PROCEED     register hit_rate_delta_v1 with baseline
#                                     config — don't tweak what's working
#
# Cost-overrun stopping rule (independent of hit-rate):
#   actual / estimated cost > 2.0   ABORT regardless of hit-rate. Uncontrolled
#                                   cost means the cost model is wrong; the
#                                   pilot's economics aren't reproducible.
#
# Early-stop guards (resist the urge to peek):
#   - Do NOT change pilot config mid-run (cents-eat0 detects but you should
#     just not do it). If something breaks, document + abort.
#   - Do NOT add symbols to the universe mid-run.
#   - Do NOT raise --max-cost-usd mid-run except for documented LLM rate spikes.
