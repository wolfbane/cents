name: Deploy website

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - "scripts/generate_docs.py"
      - "src/cents/cli/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cents (so generate_docs can import it)
        run: pip install .

      - name: Set up Node.js (Astro requires >=22.12)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install website dependencies
        working-directory: website
        run: bun install --frozen-lockfile

      - name: Regenerate command reference pages
        run: python scripts/generate_docs.py website

      - name: Build site
        working-directory: website
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=cents --branch=master --commit-dirty=true
